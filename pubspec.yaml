name: local_chat
description: "Local chat app with Claude Code agent integration"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.14.0
  drift_flutter: ^0.2.0
  shelf: ^1.4.1
  shelf_web_socket: ^2.0.0
  web_socket_channel: ^2.4.0
  watcher: ^1.1.0
  uuid: ^4.3.3
  path: ^1.9.0
  path_provider: ^2.1.2
  http: ^1.2.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.14.0

flutter:
  uses-material-design: true
